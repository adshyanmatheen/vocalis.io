services:
  postgres:
    image: postgres:16-alpine
    container_name: vocalis-postgres
    environment:
      POSTGRES_USER: vocalis
      POSTGRES_PASSWORD: vocalis
      POSTGRES_DB: vocalis
    ports:
      - "5432:5432"
    volumes:
      - vocalis-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocalis -d vocalis"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vocalis-network

  redis:
    image: redis:7-alpine
    container_name: vocalis-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vocalis-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vocalis-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://vocalis:vocalis@postgres:5432/vocalis
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here-change-in-production}
      - HUGGINGFACE_MODEL_ID=matheetharanadshyan/wav2vec2-svarah
      - HUGGINGFACE_CACHE_DIR=.cache/huggingface
      - USE_GROQ=${USE_GROQ:-false}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=llama-4-scout-17b-16e-instruct
      - DEVICE=cpu
      - ALIGNMENT_QUANTIZATION_BACKEND=none
      - SAMPLE_RATE=16000
      - MIN_AUDIO_DURATION_SECONDS=0.5
      - MAX_AUDIO_DURATION_SECONDS=30.0
      - MAX_WEBSOCKET_BUFFER_MB=10
      - REALTIME_INFERENCE_TIMEOUT_SECONDS=20.0
      - MAX_CONCURRENT_REALTIME_INFERENCES=4
      - BACKUP_ENABLED=true
      - BACKUP_DIRECTORY=backups
      - BACKUP_RETENTION_DAYS=30
      - CORS_ALLOWED_ORIGINS=["http://localhost:3000", "http://127.0.0.1:3000", "http://localhost:5173", "http://127.0.0.1:5173", "http://localhost:3010", "http://127.0.0.1:3010"]
    volumes:
      - vocalis-cache:/app/.cache
      - vocalis-backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - vocalis-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vocalis-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - vocalis-network

volumes:
  vocalis-pgdata:
    driver: local
  vocalis-cache:
    driver: local
  vocalis-backups:
    driver: local

networks:
  vocalis-network:
    driver: bridge
